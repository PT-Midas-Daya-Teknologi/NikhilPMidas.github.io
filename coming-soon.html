    <!-- Fav Icon -->

  <!-- page wrapper -->

  <body>
    <div class="boxed_wrapper">
      <div id="preloader-placeholder"></div>

      <!-- comingsoon-section -->
      <section class="comingsoon-section centred">
        <div
          class="bg-layer parallax-bg"
          data-parallax='{"y": 100}'
          style="
            background-image: url(assets/images/background/comingsoon-bg.jpg);
          "
        ></div>
        <div class="auto-container">
          <div class="inner-box">
            <figure class="logo">
              <a href="index.html"
                ><img src="assets/images/logo.webp" alt=""
              /></a>
            </figure>
            <h2>Coming Soon</h2>
            <p>
              Business is the activity of making one's living or making money by
              producing <br />cumsociis natoque.
            </p>
            <div class="timer p_relative d_block">
              <div
                class="cs-countdown"
                data-countdown="01/24/2024 05:06:59"
              ></div>
            </div>
          </div>
        </div>
      </section>
      <!-- comingsoon-section end -->

      <!-- subscribe-section -->
      <section class="subscribe-section">
        <div class="auto-container">
          <div class="row clearfix align-items-center">
            <div class="col-lg-5 col-md-12 col-sm-12 text-column">
              <div class="text">
                <h2><i class="icon-19"></i>Subscribe Our Newsletter</h2>
              </div>
            </div>
            <div class="col-lg-7 col-md-12 col-sm-12 form-column">
              <div class="form-inner">
                <form action="contact.html" method="post">
                  <div class="form-group">
                    <input
                      type="email"
                      name="emaail"
                      placeholder="Enter Your Email Adress"
                      required=""
                    />
                    <button type="submit" class="theme-btn btn-one">
                      <i class="icon-7"></i>Subscribe
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- subscribe-section end -->

      <!--Scroll to top-->
      <div class="scroll-to-top">
        <div>
          <div class="scroll-top-inner">
            <div class="scroll-bar">
              <div class="bar-inner"></div>
            </div>
            <div class="scroll-bar-text">Go To Top</div>
          </div>
        </div>
      </div>
      <!-- Scroll to top end -->
    </div>

    <!-- jequery plugins -->
    <script src="assets/js/jquery.js"></script>
