<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- Fav Icon -->
  <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.webp" />

  <!-- Critical CSS -->
  <style>
    @font-face {
      font-family: Ubuntu;
      src: url('../assets/fonts/ubuntu/ubuntu-regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap
    }

    @font-face {
      font-family: Ubuntu;
      src: url('../assets/fonts/ubuntu/ubuntu-bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap
    }

    :root {
      --radius: 14px
    }

    * {
      margin: 0;
      padding: 0;
      border: none;
      outline: 0
    }

    body {
      font-family: Ubuntu, sans-serif !important;
      font-size: 24px;
      color: #677289;
      line-height: 34px;
      font-weight: 400;
      background: #fff;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center top;
      -webkit-font-smoothing: antialiased
    }

    .loader-wrap,
    .handle-preloader {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%
    }

    .loader-wrap {
      z-index: 99999999;
      background: #fff
    }

    .handle-preloader {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999999
    }

    .animation-preloader {
      position: absolute;
      z-index: 100
    }

    .spinner {
      animation: spinner 1s infinite linear;
      border-radius: 50%;
      width: 150px;
      height: 150px;
      margin: 0 auto 45px;
      border: 3px solid #fff;
      border-top-color: rgba(255, 255, 255, .5)
    }

    .txt-loading {
      text-align: center;
      user-select: none
    }

    .letters-loading {
      font-family: Ubuntu, sans-serif;
      font-weight: 400;
      letter-spacing: 10px;
      display: inline-block;
      position: relative;
      font-size: 40px;
      line-height: 40px;
      text-transform: uppercase;
      color: #fff
    }

    .letters-loading:before {
      content: attr(data-text-preloader);
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      color: #fff;
      animation: letters-loading 4s infinite
    }

    .letters-loading:nth-child(2):before {
      animation-delay: .2s
    }

    .letters-loading:nth-child(3):before {
      animation-delay: .4s
    }

    .letters-loading:nth-child(4):before {
      animation-delay: .6s
    }

    .letters-loading:nth-child(5):before {
      animation-delay: .8s
    }

    .letters-loading:nth-child(6):before {
      animation-delay: 1s
    }

    .letters-loading:nth-child(7):before {
      animation-delay: 1.2s
    }

    .letters-loading:nth-child(8):before {
      animation-delay: 1.4s
    }

    .preloader .loaded .animation-preloader {
      opacity: 0;
      transition: .3s ease-out
    }

    .banner-style-four {
      position: relative;
      padding-top: 220px
    }

    .banner-style-four .content-box h2 {
      font-weight: 700;
      font-size: 48px;
      line-height: 58px;
      margin-bottom: 36px;
      color: #1e1e1e
    }

    .banner-style-four .content-box p {
      font-size: 24px;
      line-height: 34px;
      margin-bottom: 29px
    }

    .banner-style-four .pattern-layer {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 1001px;
      background-size: cover;
      background-repeat: no-repeat
    }

    .banner-style-four .image-box {
      position: relative;
      width: 549px;
      height: 549px;
      margin-left: 30px
    }

    .banner-style-four .image-box:before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      left: 0;
      top: 0
    }

    .banner-style-four .image-box .image {
      position: absolute;
      top: -15px;
      left: 10px
    }

    .banner-style-four .image-box .image img {
      width: 100%
    }

    .banner-style-four .shape>* {
      position: absolute;
      background-repeat: no-repeat
    }

    .shape-1 {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 535px;
      height: 535px
    }

    .shape-2 {
      left: 25px;
      top: 25px;
      width: 76px;
      height: 114px
    }

    .shape-3 {
      top: 40px;
      right: 160px;
      width: 15px;
      height: 15px
    }

    .shape-4 {
      top: 260px;
      right: -20px;
      width: 75px;
      height: 97px
    }

    .shape-5 {
      right: 95px;
      bottom: -55px;
      width: 89px;
      height: 221px
    }

    .shape-6 {
      left: 50%;
      transform: translateX(-50%);
      bottom: -7px;
      width: 144px;
      height: 58px
    }

    .auto-container {
      max-width: 1400px;
      padding: 0 15px;
      margin: 0 auto
    }

    .boxed_wrapper {
      position: relative;
      margin: 0 auto;
      overflow: hidden !important;
      width: 100%;
      min-width: 300px
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      margin: 0 -.75rem
    }

    .col-lg-6 {
      width: 50%
    }

    .col-md-12,
    .col-sm-12 {
      width: 100%
    }

    .align-items-center {
      align-items: center !important
    }

    @media(max-width:767px) {
      .spinner {
        width: 8em;
        height: 8em
      }
    }

    @media(max-width:500px) {
      .spinner {
        width: 7em;
        height: 7em
      }

      .letters-loading {
        font-size: 40px;
        letter-spacing: 10px
      }
    }
  </style>
