    <div class="boxed_wrapper">
      <div id="preloader-placeholder"></div>
      <div id="header-placeholder"></div>
      <div id="mobile-menu-placeholder"></div>

      <!-- Page Title -->
      <section class="page-title centred">
        <div class="outer-container">
          <div
            class="bg-layer parallax-bg"
            data-parallax='{"y": 100}'
            style="
              background-image: url(../assets/images/background/page-title-7.jpg);
            "
          ></div>
          <div class="auto-container">
            <div class="content-box">
              <h1>Elements</h1>

      <section class="subscribe-section">

              <div class="text">
                <h2><i class="icon-19"></i>Subscribe Our Newsletter</h2>
              </div>
            </div>
            <div class="col-lg-7 col-md-12 col-sm-12 form-column">
              <div class="form-inner">
                <form action="contact.html" method="post">
                  <div class="form-group">
                    <input
                      type="email"
                      name="emaail"
                      placeholder="Enter Your Email Adress"
                      required=""
                    />
                    <button type="submit" class="theme-btn btn-one">
                      <i class="icon-7"></i>Subscribe
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- subscribe-section end -->
      <div id="main-footer-placeholder"></div>

      <div class="scroll-to-top">
        <div>
          <div class="scroll-top-inner">
            <div class="scroll-bar">
              <div class="bar-inner"></div>
            </div>
            <div class="scroll-bar-text">Go To Top</div>
          </div>
        </div>
      </div>
      <!-- Scroll to top end -->
    </div>
